[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=30
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gui: marks tests that require GUI/display (deselect with '-m "not gui"')
    platform_linux: Linux-only tests
    platform_macos: macOS-only tests
    platform_windows: Windows-only tests
    integration: integration tests that touch the filesystem
