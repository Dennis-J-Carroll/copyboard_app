name: Copyboard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ---------- Linux-specific dependencies ----------
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xdotool xclip xsel

      # ---------- Install Python dependencies ----------
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      # ---------- Run tests ----------
      - name: Run tests (Linux – with xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a pytest --tb=short -v --timeout=60 -m "not gui"

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: |
          pytest --tb=short -v --timeout=60 -m "not gui"

      # ---------- Coverage (optional, only on ubuntu+3.11) ----------
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          xvfb-run -a pytest --cov=copyboard_extension --cov-report=xml --timeout=60 -m "not gui"

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
